<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>(function(){if(location.protocol!=='file:'){var b=document.createElement('base');b.href='/';document.head.appendChild(b);}})();</script>
<title>Entrar — Intranet FastPark</title>
<style>
:root {
    --fp-orange: #FF8C00;
    --fp-dark: #2D2D2D;
    --bg: #f4f7f6;
}
* { box-sizing: border-box; }
body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(145deg, var(--fp-dark) 0%, #1a1a2e 55%, #0f172a 100%);
    padding: 24px;
}
.card {
    width: 100%;
    max-width: 400px;
    background: #fff;
    border-radius: 12px;
    padding: 32px 28px;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    border-top: 4px solid var(--fp-orange);
}
h1 {
    margin: 0 0 6px;
    font-size: 1.35rem;
    color: var(--fp-dark);
}
.sub {
    margin: 0 0 24px;
    color: #64748b;
    font-size: 0.9rem;
}
label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    color: #475569;
    margin-bottom: 6px;
}
input {
    width: 100%;
    padding: 10px 12px;
    margin-bottom: 16px;
    border: 1px solid #cbd5e1;
    border-radius: 8px;
    font-size: 1rem;
}
input:focus {
    outline: none;
    border-color: var(--fp-orange);
    box-shadow: 0 0 0 3px rgba(255, 140, 0, 0.2);
}
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: var(--fp-orange);
    color: #fff;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
}
button:hover { filter: brightness(1.05); }
button:disabled {
    opacity: 0.65;
    cursor: not-allowed;
}
.msg {
    margin-top: 12px;
    font-size: 0.85rem;
    color: #c53030;
    min-height: 1.2em;
}
.config-warn {
    display: none;
    margin-bottom: 16px;
    padding: 10px 12px;
    background: #fff8e6;
    border: 1px solid #efd99e;
    border-radius: 8px;
    font-size: 0.8rem;
    color: #b7791f;
}
</style>
<script src="/fp-supabase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/fp-auth.js"></script>
</head>
<body>
<div class="card">
    <h1>Intranet FastPark</h1>
    <p class="sub">Acesse com usuário e senha cadastrados na aba Acessos</p>
    <form id="loginForm" autocomplete="on">
        <label for="acessoLogin">Usuário</label>
        <input type="text" id="acessoLogin" name="acesso_login" required autocomplete="username">
        <label for="acessoSenha">Senha</label>
        <input type="password" id="acessoSenha" name="acesso_senha" required autocomplete="current-password">
        <button type="submit" id="btnEntrar">Entrar</button>
    </form>
    <p id="msg" class="msg" role="alert"></p>
</div>
<script>
(function () {
    var APP = (typeof window.fpAppUrl === 'function' ? window.fpAppUrl() : (window.FP_APP_URL || '/intranet-fastpark'));
    var ACESSOS_KEY = 'fp_acessos_usuarios';
    var ACESSOS_ACTIVE_KEY = 'fp_acessos_usuario_ativo';
    var ACESSOS_AUTH_SESSION_KEY = 'fp_acessos_auth_ok';
    var form = document.getElementById('loginForm');
    var msg = document.getElementById('msg');
    var btn = document.getElementById('btnEntrar');

    var linkApp = document.getElementById('linkIntranet');
    if (linkApp) linkApp.setAttribute('href', APP);

    function getAcessosUsers(){
        try{
            var arr = JSON.parse(localStorage.getItem(ACESSOS_KEY) || '[]');
            return Array.isArray(arr) ? arr : [];
        }catch(_e){ return []; }
    }
    function loginAcessos(login, senha){
        var users = getAcessosUsers();
        if(!users.length){
            return { ok: false, message: 'Nenhum usuário cadastrado em Acessos.' };
        }
        var l = String(login || '').trim().toLowerCase();
        var s = String(senha || '');
        var user = users.find(function(u){
            return String(u.login || '').trim().toLowerCase() === l && String(u.senha || '') === s;
        });
        if(!user){
            return { ok: false, message: 'Usuário ou senha inválidos.' };
        }
        localStorage.setItem(ACESSOS_ACTIVE_KEY, String(user.id || ''));
        sessionStorage.setItem(ACESSOS_AUTH_SESSION_KEY, '1');
        return { ok: true };
    }
    if(sessionStorage.getItem(ACESSOS_AUTH_SESSION_KEY) === '1'){
        window.location.replace(APP);
        return;
    }

    form.addEventListener('submit', function (e) {
        e.preventDefault();
        msg.textContent = '';
        btn.disabled = true;
        var acessoLogin = document.getElementById('acessoLogin').value.trim();
        var acessoSenha = document.getElementById('acessoSenha').value;
        var ok = loginAcessos(acessoLogin, acessoSenha);
        if(!ok.ok){
            msg.textContent = ok.message || 'Erro ao entrar.';
            btn.disabled = false;
            return;
        }
        window.location.replace(APP);
    });
})();
</script>
</body>
</html>
