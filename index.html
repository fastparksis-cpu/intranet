<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar — Intranet FastPark</title>
<style>
:root {
    --fp-orange: #FF8C00;
    --fp-dark: #2D2D2D;
    --bg: #f4f7f6;
}
* { box-sizing: border-box; }
body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(145deg, var(--fp-dark) 0%, #1a1a2e 55%, #0f172a 100%);
    padding: 24px;
}
.card {
    width: 100%;
    max-width: 400px;
    background: #fff;
    border-radius: 12px;
    padding: 32px 28px;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    border-top: 4px solid var(--fp-orange);
}
h1 {
    margin: 0 0 6px;
    font-size: 1.35rem;
    color: var(--fp-dark);
}
.sub {
    margin: 0 0 24px;
    color: #64748b;
    font-size: 0.9rem;
}
label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    color: #475569;
    margin-bottom: 6px;
}
input {
    width: 100%;
    padding: 10px 12px;
    margin-bottom: 16px;
    border: 1px solid #cbd5e1;
    border-radius: 8px;
    font-size: 1rem;
}
input:focus {
    outline: none;
    border-color: var(--fp-orange);
    box-shadow: 0 0 0 3px rgba(255, 140, 0, 0.2);
}
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: var(--fp-orange);
    color: #fff;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
}
button:hover { filter: brightness(1.05); }
button:disabled {
    opacity: 0.65;
    cursor: not-allowed;
}
.msg {
    margin-top: 12px;
    font-size: 0.85rem;
    color: #c53030;
    min-height: 1.2em;
}
.config-warn {
    display: none;
    margin-bottom: 16px;
    padding: 10px 12px;
    background: #fff8e6;
    border: 1px solid #efd99e;
    border-radius: 8px;
    font-size: 0.8rem;
    color: #b7791f;
}
</style>
<script src="fp-supabase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="fp-auth.js"></script>
</head>
<body>
<div class="card">
    <h1>Intranet FastPark</h1>
    <p class="sub">Acesse com seu e-mail corporativo</p>
    <div id="configWarn" class="config-warn">
        Configure <strong>fp-supabase-config.js</strong> com a URL e a chave anon do Supabase.
    </div>
    <form id="loginForm" autocomplete="on">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" required autocomplete="username">
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="password" required autocomplete="current-password">
        <button type="submit" id="btnEntrar">Entrar</button>
    </form>
    <p id="msg" class="msg" role="alert"></p>
</div>
<script>
(function () {
    var APP = (typeof window.fpAppUrl === 'function' ? window.fpAppUrl() : (window.FP_APP_URL || '/Intranet_FastPark_Integrada.html'));
    var form = document.getElementById('loginForm');
    var msg = document.getElementById('msg');
    var btn = document.getElementById('btnEntrar');
    var configWarn = document.getElementById('configWarn');

    if (typeof window.fpSupabaseConfigIsReady === 'function' ? !window.fpSupabaseConfigIsReady() : (!window.FP_SUPABASE_URL || !window.FP_SUPABASE_ANON_KEY)) {
        configWarn.style.display = 'block';
        btn.disabled = true;
        return;
    }
    configWarn.style.display = 'none';

    var linkApp = document.getElementById('linkIntranet');
    if (linkApp) linkApp.setAttribute('href', APP);

    window.fpRedirectIfSession(APP).catch(function () {});

    form.addEventListener('submit', function (e) {
        e.preventDefault();
        msg.textContent = '';
        btn.disabled = true;
        var email = document.getElementById('email').value.trim();
        var password = document.getElementById('senha').value;

        window.fpSignIn(email, password).then(function (res) {
            if (res.error) {
                msg.textContent = res.error.message || 'Erro ao entrar.';
                btn.disabled = false;
                return;
            }
            if (typeof window.fpGoToApp === 'function') {
                window.fpGoToApp(APP).then(function (ok) {
                    if (!ok) {
                        msg.textContent = 'Login OK, mas a sessão não ficou no navegador. Verifique Supabase → URL Configuration (domínio Vercel).';
                        btn.disabled = false;
                    }
                });
            } else {
                window.location.replace(APP);
            }
        }).catch(function (err) {
            msg.textContent = err && err.message ? err.message : 'Erro ao entrar.';
            btn.disabled = false;
        });
    });
})();
</script>
</body>
</html>
